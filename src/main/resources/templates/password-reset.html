<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
    <style>
        body { font-family: 'Inter', Arial, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); border: 1px solid #333; }
        .logo { font-size: 28px; font-weight: bold; color: #00ffcc; margin-bottom: 20px; letter-spacing: 1px; }
        .content { font-size: 16px; color: #b3b3b3; line-height: 1.6; }
        .token { display: inline-block; font-size: 32px; font-weight: bold; letter-spacing: 5px; color: #ffffff; background: #292929; padding: 15px 30px; border-radius: 8px; margin: 20px 0; border: 1px dashed #00ffcc; }
        .footer { font-size: 12px; color: #666; margin-top: 30px; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">Bruzo</div>
    <div class="content">
        <p>Hello <span th:text="${name}">User</span>,</p>
        <p>You requested a password reset. Please use the 6-digit code below to securely reset your password. This code will expire in 15 minutes.</p>
        <div class="token" th:text="${token}">123456</div>
        <p>If you didn't request a password reset, you can safely ignore this email.</p>
    </div>
    <div class="footer">
        <p>&copy; 2026 Bruzo Transport. All rights reserved.</p>
    </div>
</div>
</body>
</html>
