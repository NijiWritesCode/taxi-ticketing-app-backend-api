<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #121212; color: #ffffff; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 12px; text-align: center; }
        .header { color: #ff9800; font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .content { font-size: 16px; line-height: 1.6; color: #e0e0e0; }
        .otp-box { display: inline-block; padding: 15px 30px; background: #2c2c2c; color: #ff9800; font-size: 32px; font-weight: bold; letter-spacing: 5px; border-radius: 8px; margin: 20px 0; border: 1px solid #ff9800; }
        .footer { margin-top: 40px; font-size: 12px; color: #777; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">Security Verification 🔐</div>
    <div class="content">
        <p>Please use the following One-Time Password (OTP) to verify your identity.</p>
        <div class="otp-box" th:text="${otpCode}">000000</div>
        <p>This code will expire in 10 minutes. If you did not request this, please ignore this email.</p>
    </div>
    <div class="footer">
        © 2026 Bruzo Technologies. Security Team.
    </div>
</div>
</body>
</html>
