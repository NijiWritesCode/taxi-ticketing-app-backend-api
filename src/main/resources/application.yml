spring:
  application:
    name: busgo-backend
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/busgo
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # Let Hibernate auto-create tables for now
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970 # Sample 256-bit secret (32 bytes hex)
  expiration: 86400000 # 1 day in milliseconds
  refresh-expiration: 604800000 # 7 days in milliseconds

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.busgo.backend: DEBUG
    org.springframework.security: DEBUG
